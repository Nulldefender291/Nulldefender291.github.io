<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullDefender - Secure Tools</title>
    
    <!-- PASSWORD LOCK - NAKA-LOCK YUNG SITE -->
    <script>
        // PALITAN MO TO NG GUSTO MONG PASSWORD
        const SITE_PASSWORD = "NullDefender2026";
        
        let attempts = 3;
        while (attempts > 0) {
            let userPassword = prompt("🔐 Enter Password to access NullDefender:\n\nAttempts left: " + attempts);
            
            if (userPassword === SITE_PASSWORD) {
                break; // Tama password, pasok na
            } else if (userPassword === null) {
                // Pag nag-cancel
                document.body.innerHTML = "<h1 style='color:#ff4444;text-align:center;margin-top:50vh;font-family:monospace'>Access Cancelled</h1>";
                throw new Error("Access cancelled");
            } else {
                attempts--;
                if (attempts === 0) {
                    document.body.innerHTML = "<h1 style='color:#ff4444;text-align:center;margin-top:50vh;font-family:monospace'>⛔ ACCESS DENIED ⛔<br><br>Too many failed attempts</h1>";
                    throw new Error("Access denied");
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 50%, #00ff9d10 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #00ff9d08 0%, transparent 50%);
        }
        .container {
            text-align: center;
            max-width: 600px;
            border: 2px solid #00ff9d;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 0 30px #00ff9d40;
            background: #0f0f1a;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff9d;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #00ff9d; }
            50% { text-shadow: 0 0 40px #00ff9d, 0 0 60px #00ff9d; }
        }
        .tagline { 
            font-size: 1.1rem; 
            margin-bottom: 30px; 
            opacity: 0.8;
        }
        .tool-box {
            background: #000;
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 25px;
            margin: 20px 0;
        }
        .tool-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
        }
        button {
            background: #00ff9d;
            color: #0a0a0f;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
            margin: 10px 5px;
        }
        button:hover {
            background: #00cc7d;
            box-shadow: 0 0 20px #00ff9d;
            transform: translateY(-2px);
        }
        .password-display {
            background: #0a0a0f;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 1.1rem;
            word-break: break-all;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .option label {
            cursor: pointer;
            font-size: 0.9rem;
        }
        input[type="checkbox"] {
            accent-color: #00ff9d;
            margin-right: 5px;
        }
        .length-input {
            background: #000;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 8px;
            width: 60px;
            text-align: center;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .copied {
            color: #00ff9d;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .copied.show { opacity: 1; }
        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NullDefender</h1>
        <p class="tagline">// Secure Tools for the Digital Age</p>
        
        <div class="tool-box">
            <div class="tool-title">🔐 Password Generator</div>
            <div class="options">
                <div class="option">
                    <label>Length: <input type="number" id="length" class="length-input" value="16" min="8" max="64"></label>
                </div>
            </div>
            <div class="options">
                <div class="option">
                    <label><input type="checkbox" id="uppercase" checked> A-Z</label>
                </div>
                <div class="option">
                    <label><input type="checkbox" id="lowercase" checked> a-z</label>
                </div>
                <div class="option">
                    <label><input type="checkbox" id="numbers" checked> 0-9</label>
                </div>
                <div class="option">
                    <label><input type="checkbox" id="symbols" checked> !@#</label>
                </div>
            </div>
            <div class="password-display" id="password">Click Generate</div>
            <button onclick="generatePassword()">Generate Password</button>
            <button onclick="copyPassword()">Copy</button>
            <div class="copied" id="copied">✓ Copied to clipboard!</div>
        </div>

        <footer>
            <p>© 2026 NullDefender | Built for Security</p>
        </footer>
    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            
            let charset = '';
            if (useUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) charset += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) charset += '0123456789';
            if (useSymbols) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            if (charset === '') {
                document.getElementById('password').textContent = 'Select at least one option';
                return;
            }
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            document.getElementById('password').textContent = password;
            document.getElementById('copied').classList.remove('show');
        }
        
        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password === 'Click Generate' || password === 'Select at least one option') return;
            
            navigator.clipboard.writeText(password).then(() => {
                const copied = document.getElementById('copied');
                copied.classList.add('show');
                setTimeout(() => copied.classList.remove('show'), 2000);
            });
        }
        
        generatePassword();
    </script>
</body>
</html>
