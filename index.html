<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Account Protection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #232527;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* LOGIN PAGE */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: #393b3d;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .roblox-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .roblox-logo h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
        }
        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .input-group { 
            margin-bottom: 15px;
            position: relative;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #bdbebe;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            background: #191b1d;
            border: 1px solid #565656;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #00a2ff;
        }
        .show-pass {
            position: absolute;
            right: 12px;
            top: 37px;
            background: transparent;
            border: none;
            color: #bdbebe;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00a2ff;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover { background: #0084cc; }
        .error-msg {
            background: #a34a4a;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show { display: block; }
        
        /* DASHBOARD */
        .dashboard {
            display: none;
            min-height: 100vh;
            background: #191b1d;
        }
        .navbar {
            background: #232527;
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid #393b3d;
        }
        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            margin-right: 30px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
        }
        .avatar {
            width: 35px;
            height: 35px;
            background: #00a2ff;
            border-radius: 50%;
            cursor: pointer;
        }
        .content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .welcome-banner {
            background: linear-gradient(135deg, #00a2ff 0%, #0066cc 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .welcome-banner h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        /* PROTECTED ACCOUNTS SECTION */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .account-card {
            background: #232527;
            border: 2px solid #393b3d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .account-card:hover {
            border-color: #00a2ff;
            transform: translateY(-3px);
        }
        .account-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .account-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
        }
        .account-name {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .account-status {
            display: inline-block;
            padding: 4px 12px;
            background: #00a2ff;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 5px;
        }
        .account-status.safe {
            background: #00ff9d;
            color: #000;
        }
        .account-info {
            color: #bdbebe;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .add-account-btn {
            background: #393b3d;
            border: 2px dashed #565656;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            color: #bdbebe;
            font-weight: 600;
        }
        .add-account-btn:hover {
            border-color: #00a2ff;
            color: #00a2ff;
        }
        .logout-btn {
            background: #a34a4a;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .stats-box {
            background: #232527;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item h3 {
            font-size: 2rem;
            color: #00a2ff;
            margin-bottom: 5px;
        }
        .stat-item p {
            color: #bdbebe;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="roblox-logo">
                <h1>ROBLOX</h1>
            </div>
            <h2>Admin Login</h2>
            
            <div class="error-msg" id="errorMsg">
                ❌ Wrong username or password!
            </div>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Admin Username">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') robloxLogin()">
                <button class="show-pass" onclick="togglePassword()" type="button">👁️</button>
            </div>
            
            <button class="login-btn" onclick="robloxLogin()">Log In</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="navbar">
            <div class="nav-logo">ROBLOX SHIELD</div>
            <div class="nav-right">
                <button class="logout-btn" onclick="logout()">Log Out</button>
                <div class="avatar"></div>
            </div>
        </div>
        
        <div class="content">
            <div class="welcome-banner">
                <h1>🛡️ Account Protection Dashboard</h1>
                <p>Monitoring mo lahat ng Roblox accounts na prinoprotektahan mo</p>
            </div>
            
            <div class="stats-box">
                <div class="stat-item">
                    <h3 id="totalAccounts">0</h3>
                    <p>Protected Accounts</p>
                </div>
                <div class="stat-item">
                    <h3>100%</h3>
                    <p>Security Status</p>
                </div>
                <div class="stat-item">
                    <h3>24/7</h3>
                    <p>Monitoring</p>
                </div>
            </div>
            
            <div class="section-title">
                🔐 Protected Roblox Accounts
            </div>
            
            <div class="accounts-grid" id="accountsGrid">
                <!-- Accounts lalabas dito via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // LOGIN CREDENTIALS - PALITAN MO TO
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "NullDefender2026";
        
        // ========================================
        // LISTAHAN NG ROBLOX ACCOUNTS MO - EDIT MO TO
        // ========================================
        const PROTECTED_ACCOUNTS = [
            {
                username: "NullDefender291",
                status: "Safe",
                note: "admin",
                avatar: "N"
            },
            {
                username: "Wilbert_Gimoro12",
                status: "Safe", 
                note: "Alt Account",
                avatar: "R"
            },
            {
                username: "wanitoSaludares",
                status: "Safe",
                note: "Client Account",
                avatar: "B"
            }
            // DAGDAG KA DITO: { username: "BagongAccount", status: "Safe", note: "Note mo", avatar: "X" },
        ];
        // ========================================
        
        if (sessionStorage.getItem('robloxLoggedIn') === 'true') {
            showDashboard();
        }
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const showBtn = document.querySelector('.show-pass');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                showBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                showBtn.textContent = '👁️';
            }
        }
        
        function robloxLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                sessionStorage.setItem('robloxLoggedIn', 'true');
                showDashboard();
            } else {
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                setTimeout(() => errorMsg.classList.remove('show'), 2000);
            }
        }
        
        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadAccounts();
        }
        
        function loadAccounts() {
            const grid = document.getElementById('accountsGrid');
            const totalEl = document.getElementById('totalAccounts');
            
            totalEl.textContent = PROTECTED_ACCOUNTS.length;
            grid.innerHTML = '';
            
            PROTECTED_ACCOUNTS.forEach(account => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-header">
                        <div class="account-avatar">${account.avatar}</div>
                        <div>
                            <div class="account-name">${account.username}</div>
                            <div class="account-status safe">✓ ${account.status}</div>
                        </div>
                    </div>
                    <div class="account-info">
                        📝 ${account.note}<br>
                        🔒 Protected since: Today
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function logout() {
            sessionStorage.removeItem('robloxLoggedIn');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
