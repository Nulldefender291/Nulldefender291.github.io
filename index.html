<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In to Roblox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #232527;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: #393b3d;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .roblox-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .roblox-logo h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
        }
        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #bdbebe;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #191b1d;
            border: 1px solid #565656;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #00a2ff;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00a2ff;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #0084cc;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #bdbebe;
            font-size: 0.9rem;
        }
        .signup-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #bdbebe;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .signup-btn:hover {
            background: #4a4c4e;
        }
        .error-msg {
            background: #a34a4a;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show { display: block; }
        .success-msg {
            background: #00ff9d;
            color: #0a0a0f;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            text-align: center;
        }
        .success-msg.show { display: block; }
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .footer-links a {
            color: #bdbebe;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .hidden { display: none; }
        
        /* UNLOCKED CONTENT */
        .main-content {
            text-align: center;
            max-width: 600px;
            border: 2px solid #00ff9d;
            padding: 40px 30px;
            border-radius: 10px;
            background: #0f0f1a;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
        }
        .main-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff9d;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <!-- ROBLOX LOGIN -->
    <div class="login-container" id="loginPage">
        <div class="roblox-logo">
            <h1>ROBLOX</h1>
        </div>
        <h2>Log In</h2>
        
        <div class="error-msg" id="errorMsg">
            ❌ Wrong username or password!
        </div>
        
        <div class="input-group">
            <label>Username/Email/Phone</label>
            <input type="text" id="username" placeholder="Username/Email/Phone">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') robloxLogin()">
        </div>
        
        <button class="login-btn" onclick="robloxLogin()">Log In</button>
        
        <div class="divider">Don't have an account?</div>
        
        <button class="signup-btn" onclick="alert('Sign up disabled sa demo na to 😂')">Sign Up</button>
        
        <div class="footer-links">
            <a href="#">Forgot password or username?</a>
        </div>
        
        <div class="success-msg" id="successMsg">
            ✓ Logged in! Welcome to NullDefender
        </div>
    </div>

    <!-- UNLOCKED CONTENT PAG NAKA-LOGIN -->
    <div class="main-content hidden" id="mainContent">
        <h1>NullDefender</h1>
        <p style="font-size:1.2rem;margin:20px 0">// Access Granted</p>
        <p>Welcome! Naka-pasok ka na sa secret page mo.</p>
        <p style="margin:20px 0;opacity:0.8">Dito mo na lagay mga tools mo bro</p>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <script>
        // PALITAN MO TO - ETO YUNG LOGIN CREDENTIALS
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "NullDefender2026";
        
        // Check kung naka-login na
        if (sessionStorage.getItem('robloxLoggedIn') === 'true') {
            showMainContent();
        }
        
        function robloxLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                errorMsg.classList.remove('show');
                successMsg.classList.add('show');
                sessionStorage.setItem('robloxLoggedIn', 'true');
                
                setTimeout(() => {
                    showMainContent();
                }, 1000);
            } else {
                errorMsg.classList.add('show');
                successMsg.classList.remove('show');
                document.getElementById('password').value = '';
            }
        }
        
        function showMainContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }
        
        function logout() {
            sessionStorage.removeItem('robloxLoggedIn');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('successMsg').classList.remove('show');
        }
    </script>
</body>
</html>
